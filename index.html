<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="Khutabari Portal, Khutabari Rent, Adidev Khutabari, Adidev portal, Khutabari electricity Portal, Electricity, Meter Reading, Adidev Boro, Khutabari, adideb23, Adidev Boro Khutabari">
    <meta name="description" content="Official Khutabari Electricity Reading Entry portal and project dashboard by Adidev Boro.">
    <title>KHUTABARI Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- Root & Basic Styles --- */
        :root { --primary: #1a73e8; --secondary: #34a853; --dark: #202124; --danger: #d93025; --warning: #fbbc04; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }

        #portal-view { display: flex; justify-content: center; align-items: center; width: 100%; }
        .dashboard-card { background: #ffffff; width: 90%; max-width: 400px; padding: 40px 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15); text-align: center; position: relative; min-height: 400px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }

        .home-icon-btn { position: absolute; top: 20px; left: 20px; font-size: 24px; color: #27ae60; cursor: pointer; z-index: 11; }
        .menu-arrow { position: absolute; top: 20px; right: 20px; background: #2c3e50; color: white; width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; transition: 0.3s; }
        .side-menu { position: absolute; top: 0; right: 0; width: 100%; height: 100%; background: #ffffff; border-radius: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; z-index: 9; transform: translateX(100%); transition: transform 0.4s ease-in-out; }
        .side-menu.active { transform: translateX(0); }
        .overlay-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 11; display: none; flex-direction: column; justify-content: flex-start; align-items: center; padding: 30px 20px; box-sizing: border-box; overflow-y: auto; }
        
        .input-field { padding: 12px; border-radius: 10px; border: 1px solid #ccc; width: 100%; margin-bottom: 15px; font-size: 16px; outline: none; background: #fdfdfd; box-sizing: border-box; }
        .btn { display: block; text-decoration: none; color: white; padding: 18px; margin-bottom: 15px; border-radius: 15px; font-size: 18px; font-weight: 700; width: 85%; border: none; cursor: pointer; }
        .btn-reading { background: linear-gradient(to right, #673ab7, #512da8); }
        .btn-view { background: linear-gradient(to right, #2196F3, #1976D2); }
        .btn-admin { background: #2c3e50; }
        .btn-submit { background: #27ae60; padding: 12px; width: 60%; font-size: 16px; }
        .close-btn { margin-top: 20px; color: #e74c3c; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        /* Ledger Table in View Bill */
        .ledger-container { width: 100%; margin-top: 20px; overflow-x: auto; }
        .ledger-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 300px; }
        .ledger-table th, .ledger-table td { border-bottom: 1px solid #eee; padding: 10px 5px; text-align: left; }
        .ledger-table th { color: #888; font-size: 10px; text-transform: uppercase; }
        .btn-rec { background: var(--primary); color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; border: none; cursor: pointer; }

        /* --- Receipt Modal Styles --- */
        .receipt-modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .receipt-box { background: white; padding: 40px; width: 95%; max-width: 650px; border-radius: 8px; border: 1px solid #eee; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: left; }
        .receipt-header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .receipt-header h2 { margin: 0; font-size: 32px; letter-spacing: 2px; color: #000; }
        .receipt-header p { margin: 8px 0 0; font-size: 18px; color: #444; }
        .tenant-label { font-size: 16px; font-weight: bold; color: #888; text-transform: uppercase; margin-top: 20px; }
        .tenant-name { font-size: 28px; font-weight: bold; color: #000; margin-bottom: 25px; }
        .receipt-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        .receipt-table td { padding: 18px 5px; border-bottom: 1px solid #eee; font-size: 22px; color: #222; }
        .total-row { font-weight: bold; color: #000; font-size: 26px !important; }
        .receipt-footer { margin-top: 40px; text-align: center; font-size: 15px; color: #888; border-top: 1px solid #eee; padding-top: 10px; }

        /* PIN Modal */
        .pin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .pin-box { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 300px; }
        
        @media print {
            body * { visibility: hidden; }
            #receiptToPrint, #receiptToPrint * { visibility: visible; }
            #receiptToPrint { position: absolute; left: 0; top: 0; width: 100%; padding: 40px; }
            .no-print { display: none !important; }
        }
    </style>
</head>

<body>
    <div id="portal-view">
        <div class="dashboard-card">
            <i class="fas fa-home home-icon-btn" onclick="closeAll()"></i>
            <div class="menu-arrow" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>

            <div id="home-content">
                <div style="font-size: 28px; font-weight: bold;">Hello! 👋</div>
                <div style="color: #7f8c8d; margin-bottom: 20px;">Have a Nice Day</div>
                <div id="clock-display" style="font-size: 18px; color: #d35400; font-weight: bold;">Loading...</div>
                <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                    <span style="color: #7f8c8d;">Made By Adidev Boro</span>
                    <span style="font-size: 20px; font-weight: 800; display: block; color: #2c3e50;">KHUTABARI</span>
                    <a href="tel:7086187975" style="color: #3498db; text-decoration: none; font-weight: 600;"><i class="fas fa-phone-alt" style="color: #27ae60;"></i> 7086187975</a>
                </div>
            </div>

            <div id="side-panel" class="side-menu">
                <h2 style="color: #2c3e50; margin-bottom: 30px;">Menu Options</h2>
                <button onclick="openReadingForm()" class="btn btn-reading">📝 Enter Reading</button>
                <button onclick="openBill()" class="btn btn-view">📄 View Bill</button>
                <button onclick="openAdminPin()" class="btn btn-admin">🔐 Admin Panel</button>
                <div style="margin-top: 40px; color: #e74c3c; font-weight: bold; cursor: pointer;" onclick="closeMenu()">✖ CLOSE MENU</div>
            </div>

            <div id="reading-modal" class="overlay-panel">
                <h2 style="color: #673ab7; margin-bottom: 15px;">Meter Reading</h2>
                <select id="tenant-select" class="input-field">
                    <option value="" selected disabled>-- Select Tenant --</option>
                    <option>Kanu Sutradhar</option><option>Sunanda Sutradhar</option><option>Dwipen sutradhar</option><option>Hotel Kanchan</option>
                    <option>Mahabbat Ali</option><option>Kapil Khakhalary</option><option>Prasenjit Khakhalary</option><option>Anupam Sutradhar</option>
                    <option>Mrinal Banai Boro</option><option>Laba kumar Paul</option><option>Sukur Banai</option><option>Prahlad Basumatary</option>
                    <option>Rajib Sutradhar</option><option>Dimbeshwar Sutradhar</option><option>Dhruba Banai</option><option>Lalit Koch</option>
                </select>
                <input type="number" id="reading-input" class="input-field" placeholder="Enter Current Units">
                <button onclick="submitMeterReading()" class="btn btn-submit" id="submit-btn">Submit</button>
                <p id="reading-status" style="font-size: 14px; margin-top: 10px;"></p>
                <div class="close-btn" onclick="closeReadingForm()">BACK</div>
            </div>

            <div id="bill-modal" class="overlay-panel">
                <h2 style="color: #2196F3; margin-bottom: 15px;">Check Your Bill</h2>
                <div id="bill-login-box">
                    <input type="number" id="tenant-mobile-input" class="input-field" placeholder="Enter Mobile Number">
                    <button onclick="loginTenant()" class="btn btn-view" style="width:60%; padding:12px; font-size:16px;">Login</button>
                    <p id="error-text" style="color: red; display: none; font-size: 14px; margin-top:10px;">Mobile Number not found!</p>
                </div>
                
                <div id="tenant-ledger-box" style="display:none; width:100%;">
                    <h3 id="tenant-name-display" style="margin:0; color:#333;"></h3>
                    <div class="ledger-container">
                        <table class="ledger-table">
                            <thead><tr><th>Month</th><th>Total Bill</th><th>Remaining</th><th>Action</th></tr></thead>
                            <tbody id="ledger-body"></tbody>
                        </table>
                    </div>
                </div>
                <div class="close-btn" onclick="closeBill()">BACK</div>
            </div>
        </div>
    </div>

    <div id="receiptModal" class="receipt-modal">
        <div class="receipt-box" id="receiptToPrint">
            <div class="receipt-header">
                <h2>RENT RECEIPT</h2>
                <p id="receiptDateStr"></p>
            </div>
            <div class="tenant-label">Tenant Name</div>
            <div id="receiptTenantName" class="tenant-name"></div>
            <table class="receipt-table">
                <tbody id="receiptItems"></tbody>
            </table>
            <div class="receipt-footer">Generated by Tenant</div>
            <div class="no-print" style="margin-top:30px; display:flex; gap:15px; justify-content: center;">
                <button onclick="window.print()" style="background:#333; color:white; border:none; padding:12px 25px; border-radius:8px; cursor:pointer; font-size:16px;">PRINT</button>
                <button onclick="closeReceipt()" style="background:#eee; color:#333; border:none; padding:12px 25px; border-radius:8px; cursor:pointer; font-size:16px;">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="admin-pin-modal" class="pin-modal">
        <div class="pin-box">
            <h3>Admin Access</h3>
            <input type="password" id="admin-pin" class="input-field" maxlength="4" inputmode="numeric" placeholder="Enter PIN" oninput="verifyAdminPin()" style="text-align:center;">
            <p id="admin-pin-error" style="color:red; display:none;">Incorrect PIN</p>
            <button onclick="closeAdminPin()" class="close-btn" style="border:none; background:none;">CANCEL</button>
        </div>
    </div>

    <script>
        // --- 1. ENTER READING SCRIPT URL (Don't Touch) ---
        const READING_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwjzO9KRFJkRZ0w8P5QZxMo6xn4LdqZW9KmqZYOdZ50ppk-sfTufKjY92I0cTnlz48/exec';
        
        // --- 2. VIEW BILL SCRIPT URL (New Sheet) ---
        const BILL_SCRIPT_URL = 'YAHAN_APNA_VIEW_BILL_VALA_URL_DALEIN';

        function toggleMenu() { document.getElementById('side-panel').classList.add('active'); }
        function closeMenu() { document.getElementById('side-panel').classList.remove('active'); }
        function openReadingForm() { closeMenu(); document.getElementById('reading-modal').style.display = 'flex'; }
        function closeReadingForm() { document.getElementById('reading-modal').style.display = 'none'; }
        function openBill() { closeMenu(); document.getElementById('bill-modal').style.display = 'flex'; }
        function closeBill() { 
            document.getElementById('bill-modal').style.display = 'none'; 
            document.getElementById('bill-login-box').style.display = 'block';
            document.getElementById('tenant-ledger-box').style.display = 'none';
        }
        function openAdminPin() { closeMenu(); document.getElementById('admin-pin-modal').style.display = 'flex'; document.getElementById('admin-pin').focus(); }
        function closeAdminPin() { document.getElementById('admin-pin-modal').style.display = 'none'; }
        function closeAll() { closeMenu(); closeReadingForm(); closeBill(); closeAdminPin(); }
        function closeReceipt() { document.getElementById('receiptModal').style.display = 'none'; }

        function verifyAdminPin() {
            const pin = document.getElementById('admin-pin').value;
            if (pin === '7086') { window.location.href = 'admin.html'; } 
            else if(pin.length === 4) { document.getElementById('admin-pin-error').style.display = 'block'; }
        }

        /* --- UPDATED: LOGIN VIA BILL_SCRIPT_URL --- */
        async function loginTenant() {
            const mobileInput = document.getElementById('tenant-mobile-input').value.trim();
            if (!mobileInput) return alert("Please enter mobile number");

            const loginBtn = document.querySelector('#bill-login-box .btn-view');
            const errorText = document.getElementById('error-text');
            loginBtn.innerText = "Connecting...";
            loginBtn.disabled = true;

            try {
                const response = await fetch(BILL_SCRIPT_URL);
                const allData = await response.json();
                const tenantRecords = allData.filter(row => row[2] == mobileInput);

                if (tenantRecords.length > 0) {
                    document.getElementById('bill-login-box').style.display = 'none';
                    document.getElementById('tenant-ledger-box').style.display = 'block';
                    const tenantName = tenantRecords[0][1]; 
                    document.getElementById('tenant-name-display').innerText = tenantName;
                    renderSheetLedger(tenantRecords.reverse());
                } else {
                    errorText.style.display = 'block';
                    setTimeout(() => errorText.style.display = 'none', 3000);
                }
            } catch (e) {
                console.error(e);
                alert("Server Error! Bill URL check kijiye.");
            } finally {
                loginBtn.innerText = "Login";
                loginBtn.disabled = false;
            }
        }

        function renderSheetLedger(records) {
            const tbody = document.getElementById('ledger-body');
            tbody.innerHTML = records.map((r, i) => `
                <tr>
                    <td>${r[3]}</td>
                    <td>₹${r[4]}</td>
                    <td style="color:${r[5] > 0 ? 'red' : 'green'}">₹${r[5]}</td>
                    <td><button class="btn-rec" onclick='viewSheetReceipt(${JSON.stringify(r)})'>Receipt</button></td>
                </tr>
            `).join('');
        }

        function viewSheetReceipt(r) {
            document.getElementById('receiptDateStr').innerText = "Receipt Date: " + r[6];
            document.getElementById('receiptTenantName').innerText = r[1];
            document.getElementById('receiptItems').innerHTML = `
                <tr><td style="width:65%;">Room Rent (${r[3]})</td><td style="text-align:right; width:35%;">₹${r[7]}</td></tr>
                <tr><td>Electricity (${r[8]} units @ ₹${r[9] || 8})</td><td style="text-align:right; width:35%;">₹${r[10]}</td></tr>
                <tr><td>Arrears / Previous Balance</td><td style="text-align:right; width:35%;">₹${r[11] || 0}</td></tr>
                <tr class="total-row"><td>Grand Total</td><td style="text-align:right; width:35%;">₹${r[4]}</td></tr>
                <tr style="color:green; font-weight:bold;"><td>Amount Paid</td><td style="text-align:right; width:35%;">₹${r[12]}</td></tr>
                <tr style="color:red; font-weight:bold;"><td>Balance Due</td><td style="text-align:right; width:35%;">₹${r[5]}</td></tr>
            `;
            document.getElementById('receiptModal').style.display = 'flex';
        }

        /* --- SUBMIT READING VIA READING_SCRIPT_URL (Unchanged) --- */
        async function submitMeterReading() {
            const name = document.getElementById('tenant-select').value;
            const reading = document.getElementById('reading-input').value;
            const status = document.getElementById('reading-status');
            if (!name || !reading) return alert("Fill all fields");
            status.innerText = "Submitting...";
            try {
                await fetch(READING_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tenantName: name, reading: reading }) });
                status.innerText = "🙏 Thank You";
                document.getElementById('reading-input').value = "";
            } catch (e) { status.innerText = "Submitted ✅"; }
        }

        function updateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('clock-display').innerHTML = now.toLocaleDateString('en-IN', options);
        }
        setInterval(updateTime, 1000); updateTime();
    </script>
</body>
</html>
