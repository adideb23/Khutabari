<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="Khutabari Portal, Khutabari Rent, Adidev Khutabari, Adidev portal, Khutabari electricity Portal, Electricity, Meter Reading, Adidev Boro, Khutabari, adideb23, Adidev Boro Khutabari">
    <meta name="description" content="Official Khutabari Electricity Reading Entry portal and project dashboard by Adidev Boro.">
    <title>KHUTABARI Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        .dashboard-card { 
            background: #ffffff; 
            width: 90%; 
            max-width: 400px; 
            padding: 40px 25px; /* Padding thoda kam kiya */
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            text-align: center;
            position: relative;
            min-height: 400px; /* Height thoda badhaya taki content na kante */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .home-icon-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            color: #27ae60;
            cursor: pointer;
            z-index: 10;
        }

        .menu-arrow {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #2c3e50;
            color: white;
            padding: 15px 8px;
            border-radius: 0 12px 12px 0;
            cursor: pointer;
            z-index: 8;
            transition: 0.3s;
        }

        .side-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 9;
            transform: translateX(-100%); 
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .side-menu.active { transform: translateX(0); }

        .bill-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 11;
            display: none; 
            flex-direction: column;
            justify-content: flex-start; /* Top se start hoga */
            align-items: center;
            padding: 30px 20px;
            box-sizing: border-box;
            overflow-y: auto; /* Agar content jyada ho to scroll ho jaye */
        }

        .search-input {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            width: 85%;
            margin-bottom: 10px;
            font-size: 16px;
            outline: none;
        }

        .bill-details {
            width: 90%;
            text-align: left;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid #2196F3;
            margin-top: 15px;
            box-sizing: border-box;
        }

        .btn { 
            display: block; 
            text-decoration: none; 
            color: white; 
            padding: 18px; 
            margin-bottom: 15px; 
            border-radius: 15px; 
            font-size: 18px; 
            font-weight: 700; 
            width: 85%;
            border: none;
            cursor: pointer;
        }
        .btn-reading { background: linear-gradient(to right, #673ab7, #512da8); }
        .btn-view { background: linear-gradient(to right, #2196F3, #1976D2); }
        .btn-search { background: #2c3e50; padding: 12px; width: 60%; font-size: 16px; margin-bottom: 10px; }
        
        .close-menu, .close-bill {
            margin-top: 20px;
            margin-bottom: 10px;
            color: #e74c3c;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 14px;
        }

        #clock-display {
            font-size: 18px;
            color: #d35400;
            font-weight: bold;
            background: #fff5e6;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .signature { margin-top: 10px; border-top: 1px solid #eee; padding-top: 15px; }
        .project-name { font-size: 20px; font-weight: 800; letter-spacing: 2px; color: #2c3e50; display: block; text-transform: uppercase; }
        .call-link { display: inline-block; margin-top: 10px; color: #3498db; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <i class="fas fa-home home-icon-btn" onclick="closeAll()"></i>

        <div class="menu-arrow" onclick="toggleMenu()">
            <i class="fas fa-chevron-right"></i>
        </div>

        <div id="home-content">
            <div style="font-size: 28px; font-weight: bold;">Hello! 👋</div>
            <div style="color: #7f8c8d; margin-bottom: 20px;">Have a Nice Day</div>
            <div id="clock-display">Loading...</div>

            <div class="signature">
                <span style="color: #7f8c8d;">Made By Adidev Boro</span>
                <span class="project-name">KHUTABARI</span>
                <a href="tel:7086187975" class="call-link">
                    <i class="fas fa-phone-alt" style="color: #27ae60;"></i> 7086187975
                </a>
            </div>
        </div>

        <div id="side-panel" class="side-menu">
            <h2 style="color: #2c3e50; margin-bottom: 30px;">Menu Options</h2>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSeozUFzRkVBycY7pN8_-1Gy73whHa2qslEnJNKKJrJcBMmXeA/viewform" target="_blank" class="btn btn-reading">📝 Enter Reading</a>
            <button onclick="openBill()" class="btn btn-view">📄 View Bill</button>
            <div class="close-menu" onclick="closeMenu()">✖ Close Menu</div>
        </div>

        <div id="bill-modal" class="bill-overlay">
            <h2 style="color: #2c3e50; margin-bottom: 15px;">Check Bill</h2>
            
            <input type="text" id="cust-id-input" class="search-input" placeholder="Enter Unique ID">
            <button onclick="fetchCustomerBill()" class="btn btn-search">Search</button>

            <div id="bill-result-box" class="bill-details" style="display: none;">
                <p><strong>Name:</strong> <span id="res-name"></span></p>
                <p><strong>Rent:</strong> ₹<span id="res-rent"></span></p>
                <p><strong>E-Bill:</strong> ₹<span id="res-bill"></span></p>
                <p><strong>Pre-Balance:</strong> ₹<span id="res-prebal"></span></p>
                <p><strong>Month:</strong> <span id="res-date"></span></p>
            </div>
            
            <p id="error-text" style="color: red; display: none; font-size: 14px; margin-top: 10px;">Invalid ID! Please try again.</p>

            <div class="close-bill" onclick="closeBill()">
                <i class="fas fa-times"></i> BACK
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('side-panel').classList.add('active');
        }
        function closeMenu() {
            document.getElementById('side-panel').classList.remove('active');
        }
        function closeAll() {
            closeMenu();
            closeBill();
        }

        function openBill() {
            document.getElementById('bill-modal').style.display = 'flex';
        }
        
        function closeBill() {
            document.getElementById('bill-modal').style.display = 'none';
            document.getElementById('cust-id-input').value = '';
            document.getElementById('bill-result-box').style.display = 'none';
            document.getElementById('error-text').style.display = 'none';
        }

        async function fetchCustomerBill() {
            const searchId = document.getElementById('cust-id-input').value.trim();
            const resultBox = document.getElementById('bill-result-box');
            const errorText = document.getElementById('error-text');

            if (!searchId) return;

            try {
                const response = await fetch('data.json');
                const users = await response.json();
                
                const user = users.find(u => u.id === searchId);

                if (user) {
                    document.getElementById('res-name').innerText = user.customer_name;
                    document.getElementById('res-rent').innerText = user.Rent;
                    document.getElementById('res-bill').innerText = user.E_Bill;
                    document.getElementById('res-prebal').innerText = user.Pre_Balance;
                    document.getElementById('res-date').innerText = user.Billed_Month;
                    
                    resultBox.style.display = 'block';
                    errorText.style.display = 'none';
                } else {
                    resultBox.style.display = 'none';
                    errorText.style.display = 'block';
                }
            } catch (err) {
                console.error("Fetch Error:", err);
                alert("data.json not found!");
            }
        }

        function updateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('clock-display').innerHTML = now.toLocaleDateString('en-IN', options);
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
